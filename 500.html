<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>500 – System Crash | Sky Escape</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="game-style.css">
</head>
<body data-mode="500">

  <div id="game-container">
    <canvas id="gameCanvas"></canvas>

    <!-- HUD -->
    <div id="hud">
      <div id="hud-left">
        <span id="score-display">0</span>
        <span class="hud-label">SCORE</span>
      </div>
      <div id="hud-center">
        <h1 id="game-title" class="glitch" data-text="500">500</h1>
        <p id="game-subtitle">System Crash</p>
      </div>
      <div id="hud-right">
        <span id="high-score-display">0</span>
        <span class="hud-label">BEST</span>
      </div>
    </div>

    <!-- Pause -->
    <button id="pause-btn" aria-label="Pause game">⏸</button>

    <!-- Start screen -->
    <div id="start-screen" class="overlay">
      <h2 class="overlay-title glitch" data-text="SKY ESCAPE">SKY ESCAPE</h2>
      <p class="overlay-code glitch-subtle">500</p>
      <p class="overlay-msg">Server's down. The skies are hostile. Good luck.</p>
      <p class="overlay-controls">← → Arrow keys or touch to move</p>
      <button class="btn-neon btn-neon--red" id="start-btn">ENGAGE</button>
    </div>

    <!-- Game over screen -->
    <div id="game-over" class="overlay hidden">
      <h2 class="overlay-title glitch" data-text="SYSTEM FAILURE">SYSTEM FAILURE</h2>
      <p class="overlay-score">Score: <span id="final-score">0</span></p>
      <p class="overlay-best">Best: <span id="final-best">0</span></p>
      <button class="btn-neon btn-neon--red" id="restart-btn">REBOOT</button>
      <a href="/" class="home-link">← Back to Home</a>
    </div>

    <!-- Paused screen -->
    <div id="pause-screen" class="overlay hidden">
      <h2 class="overlay-title">PAUSED</h2>
      <button class="btn-neon btn-neon--red" id="resume-btn">RESUME</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
